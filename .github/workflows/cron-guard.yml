# Cron Governance Guard — CI template for non-orchestrator repos
# Copy this file to .github/workflows/cron-guard.yml in each repo.
# Blocks deploys if vercel.json contains cron entries.
#
# Part of Phase 5 cron governance enforcement (2026-03-21).

name: Cron Governance Check

on: [push, pull_request]

jobs:
  check-no-local-crons:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Block local cron entries
        run: |
          check_file() {
            local VJ="$1"
            if [ -f "$VJ" ]; then
              CRON_COUNT=$(jq '.crons // [] | length' "$VJ" 2>/dev/null)
              if [ "$CRON_COUNT" -gt 0 ] 2>/dev/null; then
                echo "::error::${VJ} contains ${CRON_COUNT} cron entries. All crons must be in the orchestrator."
                return 1
              fi
            fi
            return 0
          }

          FAILED=0
          check_file "vercel.json" || FAILED=1
          # Check monorepo locations
          for VJ in apps/*/vercel.json; do
            [ -f "$VJ" ] && { check_file "$VJ" || FAILED=1; }
          done

          if [ "$FAILED" -eq 1 ]; then
            echo ""
            echo "All cron scheduling must go through the orchestrator."
            echo "See: orchestrator CLAUDE.md > Integration Protocol"
            exit 1
          fi

          echo "✅ No local cron entries found."
