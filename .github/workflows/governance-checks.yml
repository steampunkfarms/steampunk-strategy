name: Governance Checks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: governance-${{ github.ref }}
  cancel-in-progress: true

jobs:
  governance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log local cron entries (distributed model)
        run: |
          # SFOS uses distributed crons since 2026-03-30 — each repo owns its
          # own vercel.json cron entries. The orchestrator weekly-cron-scan
          # monitors cross-repo cron governance. This step is informational only.
          for VJ in vercel.json apps/*/vercel.json; do
            if [ -f "$VJ" ]; then
              COUNT=$(jq '.crons // [] | length' "$VJ" 2>/dev/null)
              [ "$COUNT" -gt 0 ] && echo "ℹ️ ${VJ}: ${COUNT} cron entries (distributed model)"
            fi
          done
          echo "✅ Cron inventory logged."

      - name: Require health endpoint
        run: |
          HEALTH_EXISTS=false
          for path in \
            "app/api/health/route.ts" \
            "app/api/health/route.js" \
            "src/app/api/health/route.ts" \
            "src/app/api/health/route.js" \
            "apps/storefront/src/app/api/health/route.ts"; do
            if [ -f "$path" ]; then
              HEALTH_EXISTS=true
              break
            fi
          done
          if [ "$HEALTH_EXISTS" = false ]; then
            echo "::error::Missing /api/health endpoint. Every site must expose a health check."
            exit 1
          fi
          echo "✅ Health endpoint found."

      - name: Require revenue endpoint (payment sites)
        continue-on-error: true
        run: |
          HAS_PAYMENTS=false
          if grep -q '"stripe"' package.json 2>/dev/null || \
             grep -q '"square"' package.json 2>/dev/null; then
            HAS_PAYMENTS=true
          fi
          # Also check monorepo
          for pj in apps/*/package.json; do
            if [ -f "$pj" ] && (grep -q '"stripe"' "$pj" 2>/dev/null || \
               grep -q '"square"' "$pj" 2>/dev/null); then
              HAS_PAYMENTS=true
            fi
          done
          if [ "$HAS_PAYMENTS" = true ]; then
            REVENUE_EXISTS=false
            for path in \
              "app/api/revenue/summary/route.ts" \
              "src/app/api/revenue/summary/route.ts" \
              "apps/storefront/src/app/api/revenue/summary/route.ts"; do
              if [ -f "$path" ]; then
                REVENUE_EXISTS=true
                break
              fi
            done
            if [ "$REVENUE_EXISTS" = false ]; then
              echo "::error::This site processes payments but has no /api/revenue/summary endpoint."
              exit 1
            fi
            echo "✅ Revenue endpoint found."
          else
            echo "ℹ️ No payment processor detected — revenue endpoint not required."
          fi
